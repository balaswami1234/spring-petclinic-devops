apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic-v2
  labels:
    app: petclinic
    version: v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petclinic
      version: v2
  template:
    metadata:
      labels:
        app: petclinic
        version: v2
    spec:
      containers:
        - name: petclinic
          image: petclinic:2.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
